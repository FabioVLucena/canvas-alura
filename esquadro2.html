<canvas width="600" height="400"></canvas>

<script>

    var tela = document.querySelector('canvas');
    var pincel = tela.getContext('2d');

   	function desenhaEsquadro(x, y, tamanho){
   	 
   	 pincel.fillStyle="black";
     pincel.beginPath();
     pincel.moveTo(x, y);
     pincel.lineTo(x, tamanho);
     pincel.lineTo(tamanho, tamanho);
     pincel.fill();

     pincel.fillStyle="white";
     pincel.beginPath();
     pincel.moveTo(x + 50, y + 125);
     pincel.lineTo(x + 50, tamanho - 50);
     pincel.lineTo(x + 225, tamanho - 50);
     pincel.fill();

   	}
   	desenhaEsquadro(50, 50, 400);
    
   
</script>

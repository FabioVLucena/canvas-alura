<canvas width="600" height="400"></canvas>

<script>

	var tela = document.querySelector ('canvas');
	var pincel = tela.getContext ('2d');
	
	pincel.fillStyle = 'lightgray';
	pincel.fillRect (0, 0, 600, 400);
	
	function desenhaCenario(xCenario, yCenario, largura, altura){
		
		pincel.fillStyle = 'black';
		pincel.fillRect (xCenario, yCenario, largura, altura);
		
	}
	
	function limpaTela(){
		
		pincel.fillStyle = 'lightgray';
		pincel.fillRect (0, 0, 600, 400);
		
	}
	
	function desenhaQuadrado (x, y){
		
		pincel.fillStyle = 'red';
		pincel.fillRect (x, y, 40, 40);
	
	}
	
	function atualizaTela(){
		
		limpaTela();
		desenhaCenario(0, 340, 200, 100);
		desenhaCenario(300, 340, 200, 100);
		
		if ((y == 300)
			&& (x <= 195)
			&& (x >= -40)){
			
			desenhaQuadrado (x, y);
		}else if ((y == 300)
			&& (x <= 495)
			&& (x >= 265)){
			
			desenhaQuadrado (x, y);
			
		}else{
			
			desenhaQuadrado (x, y);
			y++;
		}
		
	}
	
	setInterval(atualizaTela, 10);
	
	var y = 0;
	var x = 10;
	
	// Movimento Quadrado
	
	var esquerda = 37
	var cima = 38
	var direita = 39
	
	var taxa = 5;
	
	function leDoTeclado(evento) {
		
		if((evento.keyCode == cima)
			&& (y == 300)){
			
			y = y - 100;
			x = x + 20;
			
		}else if (evento.keyCode == esquerda){
			
			x = x - taxa;
			
		}else if (evento.keyCode == direita){
			
			x = x + taxa;
		}
	}
	
	document.onkeydown = leDoTeclado;


</script>
